name: Build Geode Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        config:
        - name: Windows
          os: windows-latest
          
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Geode CLI
      uses: geode-sdk/cli/.github/actions/setup@main

    - name: Clone Geode SDK
      run: |
        git clone --depth 1 https://github.com/geode-sdk/geode.git ${{ github.workspace }}/geode-sdk
        
    - name: Build Geode Mod
      working-directory: geode-mod
      env:
        GEODE_SDK: ${{ github.workspace }}/geode-sdk
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gd-mcp-mod-${{ matrix.config.name }}
        path: geode-mod/build/**/*.geode
